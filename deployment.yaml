apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app-standard  # Changed to be unique
  template:
    metadata:
      labels:
        app: devops-app-standard  # Changed to be unique
    spec:
      containers:
      - name: devops-app
        image: arunbalaji6768/devops-app:latest 
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: devops-app-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: devops-app-standard  # Points specifically to the Standard pods